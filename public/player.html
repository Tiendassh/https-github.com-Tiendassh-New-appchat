<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incognito Video Player</title>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }
        
        #error-container {
            display: none;
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f1f5f9;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            z-index: 10;
        }
        
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem; color: #fff; }
        p { font-size: 0.875rem; color: #94a3b8; max-width: 300px; margin-bottom: 2rem; line-height: 1.5; }
        
        .btn {
            display: inline-block;
            background: linear-gradient(to right, #c026d3, #e11d48);
            color: #fff;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(192, 38, 211, 0.3);
        }
        
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(192, 38, 211, 0.1);
            border-top-color: #c026d3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader" class="loader"></div>
    <div id="controls" style="position: absolute; top: 10px; right: 10px; z-index: 20; display: flex; gap: 8px;">
        <button onclick="togglePopout()" class="btn" style="padding: 0.5rem 1rem; font-size: 0.7rem; box-shadow: none; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);">Pop-out ↗️</button>
    </div>
    <div id="error-container">
        <div class="icon">⚠️</div>
        <h1>Contenido Restringido</h1>
        <p>Este servidor de video (SpankBang/xHamster) bloquea la reproducción dentro de AI Studio por seguridad.</p>
        <div style="display: flex; gap: 10px;">
            <a id="direct-link" href="#" target="_blank" class="btn">Abrir en Pestaña</a>
            <button onclick="tryBypass()" class="btn" style="background: linear-gradient(to right, #4f46e5, #c026d3);">Bypass Seguro</button>
        </div>
    </div>
    
    <iframe id="player" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');
        const player = document.getElementById('player');
        const loader = document.getElementById('loader');
        const errorContainer = document.getElementById('error-container');
        const directLink = document.getElementById('direct-link');
        
        function togglePopout() {
            window.open(window.location.href, '_blank', 'width=1280,height=720');
        }

        function tryBypass() {
            if (videoUrl) {
                // Usamos nuestro nuevo proxy interno
                const proxyUrl = `/api/proxy?url=${videoUrl}`;
                loader.style.display = 'block';
                errorContainer.style.display = 'none';
                player.src = proxyUrl;
            }
        }

        const isProxyMode = urlParams.get('proxy') === 'true';
        
        if (videoUrl) {
            const decodedUrl = decodeURIComponent(videoUrl);
            
            if (isProxyMode) {
                player.src = `/api/proxy?url=${encodeURIComponent(decodedUrl)}`;
            } else {
                player.src = decodedUrl;
            }
            
            directLink.href = decodedUrl;
            
            // Show error container if it takes too long (heuristic for blocked frames)
            const timeout = setTimeout(() => {
                loader.style.display = 'none';
                errorContainer.style.display = 'flex';
            }, 5000);
            
            player.onload = () => {
                clearTimeout(timeout);
                loader.style.display = 'none';
                // If it loaded, we hide error just in case it was showing
                errorContainer.style.display = 'none';
            };
        } else {
            loader.style.display = 'none';
            errorContainer.style.display = 'flex';
            errorContainer.querySelector('h1').innerText = 'No se encontró la URL';
            errorContainer.querySelector('p').innerText = 'Por favor selecciona un video válido desde la aplicación.';
            directLink.style.display = 'none';
        }
    </script>
</body>
</html>
